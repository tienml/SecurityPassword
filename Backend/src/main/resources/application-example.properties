spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AuthSystem;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=your_database_password
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
jwt.secret=your_long_jwt_secret_key
jwt.expiration=86400000
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
server.port=8080
app.security.max-failed-attempts=5
app.security.lock-duration-minutes=5
app.security.otp-expiration-minutes=10
app.security.max-otp-failed-attempts=5
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.jackson.time-zone=Asia/Ho_Chi_Minh